<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SMAEK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#2a2a2a;--border2:#333;--text:#f0f0f0;--text2:#a0a0a0;--text3:#606060;--white:#fff;--danger:#ff4444;--mono:'Space Mono',monospace;--sans:'Manrope',sans-serif}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

    /* grid bg */
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none}

    .card{position:relative;z-index:1;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:40px;width:400px;max-width:95vw}

    .logo-area{margin-bottom:32px}
    .logo-tag{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
    .logo-title{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--white);letter-spacing:-.03em}

    h1{font-family:var(--mono);font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}
    .sub{font-size:12px;color:var(--text3);margin-bottom:28px;font-family:var(--mono)}

    .field{margin-bottom:14px}
    .field label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-family:var(--mono);margin-bottom:6px}
    .field input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--white)}

    .role-row{display:flex;gap:8px;margin-bottom:24px}
    .role-btn{flex:1;padding:9px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:center;transition:all .15s}
    .role-btn:hover{border-color:var(--border2);color:var(--text)}
    .role-btn.active{background:var(--white);border-color:var(--white);color:var(--bg);font-weight:700}

    .btn-login{width:100%;padding:13px;background:var(--white);border:none;border-radius:6px;color:var(--bg);font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .15s}
    .btn-login:hover{opacity:.88}

    .err{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--danger);border-radius:6px;padding:10px 12px;font-size:12px;font-family:var(--mono);margin-bottom:14px;display:none}
    .err.show{display:block}

    .hint{margin-top:20px;padding:14px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
    .hint-title{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
    .hint-row{font-size:11px;font-family:var(--mono);color:var(--text2);margin-bottom:4px}
    .hint-row span{color:var(--white)}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-tag">// sistem manajemen</div>
      <div class="logo-title">SMAEK_</div>
    </div>
    <h1>Masuk</h1>
    <p class="sub">Autentikasi diperlukan untuk melanjutkan</p>

    <div class="err" id="errMsg">Username atau password salah.</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="masukkan username" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <div style="margin-bottom:8px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-family:var(--mono);margin-bottom:8px">Role</div>
      <div class="role-row">
        <div class="role-btn active" data-role="admin" onclick="selectRole(this)">Admin</div>
        <div class="role-btn" data-role="pembina" onclick="selectRole(this)">Pembina</div>
        <div class="role-btn" data-role="anggota" onclick="selectRole(this)">Anggota</div>
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()">MASUK →</button>

    <div class="hint">
      <div class="hint-title">// demo credentials</div>
      <div class="hint-row">Admin &nbsp;&nbsp;— <span>admin / admin123</span></div>
      <div class="hint-row">Pembina — <span>pembina / pembina123</span></div>
      <div class="hint-row">Anggota — <span>anggota / anggota123</span></div>
    </div>
  </div>

  <script>
    const USERS = [
      {username:'admin',   password:'admin123',   role:'admin',   name:'Administrator'},
      {username:'pembina', password:'pembina123', role:'pembina', name:'Pak Pembina'},
      {username:'anggota', password:'anggota123', role:'anggota', name:'Budi Santoso'},
    ];
    let selectedRole = 'admin';
    function selectRole(el) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      selectedRole = el.dataset.role;
    }
    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const user = USERS.find(x => x.username===u && x.password===p && x.role===selectedRole);
      if (user) {
        localStorage.setItem('smaek_session', JSON.stringify(user));
        location.href = 'dashboard.html';
      } else {
        document.getElementById('errMsg').classList.add('show');
      }
    }
    document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    if (localStorage.getItem('smaek_session')) location.href = 'dashboard.html';
  </script>
</body>
</html>
